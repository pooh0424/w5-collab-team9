<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>我們組的 Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <!-- 組長任務：把標題改成你們組的名字 -->
      <h1>🤖 第九組的 Chatbot</h1>
      <p class="subtitle">W5 PR 協作練習</p>
    </header>

    <!-- 組員 A 任務：在 .message 裡加上時間戳 span -->
    <!-- 組員 C 任務：在 header 下方加字數統計 p 元素 -->
    <!-- 組員 D 任務：在 header 加深色模式切換按鈕 -->

    <div id="chat-box">
      <div class="message bot" id="init-msg">
        嗨！這是我們組用 PR 協作做出來的 Chatbot 🎉
      </div>
    </div>

    <div class="input-area">
      <input id="user-input" type="text" placeholder="輸入訊息...">
      <button type="button" onclick="sendMessage()">送出</button>
      <button type="button" class="clear-button" onclick="clearChat()">清除對話</button>
    </div>

    <!-- 組員 E 任務：在這裡加鍵盤快捷鍵說明 -->
    <footer></footer>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const initialChatMarkup = chatBox.innerHTML.trim();

    function sendMessage() {
      const text = userInput.value.trim();

      if (!text) return;

      const now = new Date();
      const timestamp = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

      const userDiv = document.createElement('div');
      userDiv.className = 'message user';
      userDiv.textContent = text;
      const userTime = document.createElement('span');
      userTime.className = 'timestamp';
      userTime.textContent = timestamp;
      userDiv.appendChild(userTime);
      chatBox.appendChild(userDiv);

      const botDiv = document.createElement('div');
      botDiv.className = 'message bot';
      botDiv.textContent = `你說了「${text}」！`;
      const botTime = document.createElement('span');
      botTime.className = 'timestamp';
      botTime.textContent = timestamp;
      botDiv.appendChild(botTime);
      chatBox.appendChild(botDiv);

      userInput.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function clearChat() {
      const hasMessages = chatBox.children.length > 1;
      const hasDraft = userInput.value.trim() !== '';

      if (!hasMessages && !hasDraft) return;

      const shouldClear = window.confirm('確定要清除目前對話嗎？');

      if (!shouldClear) return;

      chatBox.innerHTML = initialChatMarkup;
      userInput.value = '';
      userInput.focus();
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    userInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    // 為第一則 bot 訊息加上時間戳
    (function() {
      const initMsg = document.getElementById('init-msg');
      const now = new Date();
      const ts = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      const span = document.createElement('span');
      span.className = 'timestamp';
      span.textContent = ts;
      initMsg.appendChild(span);
    })();

    // 組員 B 任務：在這裡加 clearChat() 函數
    // 組員 C 任務：在這裡加字數統計更新邏輯
    // 組員 D 任務：在這裡加深色模式切換函數
  </script>

</body>
</html>
